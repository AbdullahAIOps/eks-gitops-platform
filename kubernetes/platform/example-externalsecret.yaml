# Only the *reference* is committed. The actual value is pulled from the AWS
# secret `eks-gitops/demo/app-config` at sync time and written into the
# Kubernetes Secret `demo-app-config`.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-app-config
  namespace: demo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: demo-app-config
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: eks-gitops/demo/app-config
        property: api_key
    - secretKey: DB_PASSWORD
      remoteRef:
        key: eks-gitops/demo/app-config
        property: db_password
