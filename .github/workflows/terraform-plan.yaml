name: terraform-plan

# Runs on PRs that touch infrastructure. Posts the plan as a PR comment.
on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yaml"

permissions:
  contents: read
  id-token: write       # OIDC -> AWS
  pull-requests: write  # to comment the plan

env:
  AWS_REGION: eu-central-1
  TF_ENV: dev

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (backend from repo/org variables)
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=eks/${TF_ENV}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Validate
        run: terraform validate -no-color

      - name: Plan
        id: plan
        run: terraform plan -no-color -var-file="environments/${TF_ENV}.tfvars" -out=tfplan 2>&1 | tee plan.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8').slice(0, 60000);
            const body = `#### Terraform Plan (\`${process.env.TF_ENV}\`)\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
